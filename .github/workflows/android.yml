name: Build APK from Zipped Android Project

on:
  workflow_dispatch:          # permite executar manualmente
  push:
    branches: [ main ]        # ou a branch que preferir

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Se o zip vier de outra fonte, substitua esse step por um download.
      - name: Extract project from zip
        run: |
          # Extrai o zip (supondo que ele está na raiz do repositório)
          unzip -q sidespot.zip -d _extracted

          # Move o conteúdo da primeira pasta extraída para a raiz do workspace
          # Se o zip não tiver uma pasta interna, move os arquivos diretamente
          DIR=$(find _extracted -maxdepth 1 -type d ! -name '_extracted' -print -quit)
          if [ -n "$DIR" ]; then
            echo "▶ Movendo conteúdo de $DIR para o diretório atual"
            shopt -s dotglob nullglob
            mv "$DIR"/* .
            rm -rf _extracted
          else
            echo "▶ Movendo arquivos extraídos diretamente"
            shopt -s dotglob nullglob
            mv _extracted/* .
            rm -rf _extracted
          fi

          # Lista o conteúdo final para debugging
          echo "📁 Conteúdo do workspace:"
          ls -la

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Configuração do Android SDK (essencial para compilar APKs)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'  # ajuste conforme necessário

      - name: Grant execute permission for Gradle wrapper
        run: |
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            echo "❌ gradlew não encontrado! Verifique o conteúdo do zip."
            exit 1
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
